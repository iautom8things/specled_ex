name: Specs

on:
  pull_request:
    paths:
      - ".spec/**"
      - "lib/**"
      - "mix.exs"
      - "mix.lock"
      - "scripts/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - ".spec/**"
      - "lib/**"
      - "mix.exs"
      - "mix.lock"
      - "scripts/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check Specs
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the PR base ref exists for spec.check --base.
          fetch-depth: 0

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3.1"

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: mix deps.get

      - name: Check specs
        # PR runs diff against the merge base (spec.check uses base...HEAD) so
        # append-only and co-update guards apply; push/dispatch keep bare HEAD.
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            bash ./scripts/check_specs.sh --base "origin/${GITHUB_BASE_REF}"
          else
            bash ./scripts/check_specs.sh
          fi
